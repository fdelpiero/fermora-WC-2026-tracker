name: Refresh Polymarket odds

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and filter World Cup match winner odds from Polymarket
        run: |
          echo "[]" > all-events.json

          for OFFSET in 0 200 400 600 800 1000 1200 1400 1600 1800; do
            curl -sf \
              "https://gamma-api.polymarket.com/events?active=true&closed=false&limit=200&offset=$OFFSET&order=startDate&ascending=false" \
              -H "Accept: application/json" \
              -H "User-Agent: WC2026-Tracker/1.0" \
              -o page.json || echo "[]" > page.json

            jq -s '.[0] + .[1]' all-events.json page.json > merged.json
            mv merged.json all-events.json
          done

          jq '[.[] | select(
            (
              ((.title // "") + " " + (.slug // "") + " " + (.description // "") + " " +
              ((.tags // []) | map((.label // "") + " " + (.slug // "")) | join(" ")))
              | test("fifa world cup|2026 fifa world cup|fifwc|fifa.com"; "i")
            )
            and
            (
              (.markets // [])
              | any(.sportsMarketType == "moneyline")
            )
            and
            (
              ((.title // "") + " " + (.slug // "") + " " + (.description // ""))
              | test("corner|corners|card|cards|goal|goals|over|under|o/u|first half|total|trump|attend|politics|completed match|crypto|tennis|itf"; "i")
              | not
            )
          )]' all-events.json > odds.json

          echo "Filtered World Cup match winner events:"
          jq 'length' odds.json
          jq '.[0:10] | map(.title)' odds.json

      - name: Commit if changed
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add odds.json
          git diff --staged --quiet || git commit -m "chore: sync Polymarket odds"
          git push
