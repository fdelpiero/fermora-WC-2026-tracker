name: Refresh Polymarket odds

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and filter WC 2026 odds from Polymarket
        run: |
          curl -sf \
            "https://gamma-api.polymarket.com/events?active=true&closed=false&limit=1000&order=startDate&ascending=false" \
            -H "Accept: application/json" \
            -H "User-Agent: WC2026-Tracker/1.0" \
            -o all-events.json || echo "[]" > all-events.json

          jq '[.[] | select(
            ((.title // "") + " " + (.slug // "") + " " + (.description // "")) 
            | test("world cup|fifa|2026|soccer"; "i")
          )]' all-events.json > odds.json

      - name: Commit if changed
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add odds.json
          git diff --staged --quiet || git commit -m "chore: sync Polymarket odds"
          git push
