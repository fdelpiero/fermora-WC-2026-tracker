name: Refresh World Cup odds

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch World Cup odds from The Odds API
        run: |
          curl -sf \
            "https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?regions=au&markets=h2h&oddsFormat=decimal&apiKey=${{ secrets.ODDS_API_KEY }}" \
            -H "Accept: application/json" \
            -o odds.json || echo "[]" > odds.json

      - name: Commit if changed
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add odds.json
          git diff --staged --quiet || git commit -m "chore: sync World Cup odds"
          git push
