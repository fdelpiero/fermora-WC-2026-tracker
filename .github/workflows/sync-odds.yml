name: Refresh World Cup odds & scores
on:
  schedule:
  #sync schedule
    - cron: '0 4 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch World Cup odds
        run: |
          curl -sf \
            "https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?regions=au&markets=h2h&oddsFormat=decimal&apiKey=${{ secrets.ODDS_API_KEY }}" \
            -H "Accept: application/json" \
            -D /tmp/odds_headers.txt \
            -o odds.json || echo "[]" > odds.json
          grep -i "x-requests" /tmp/odds_headers.txt || true
      - name: Fetch World Cup scores
        run: |
          curl -sf \
            "https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/scores/?daysFrom=3&apiKey=${{ secrets.ODDS_API_KEY }}" \
            -H "Accept: application/json" \
            -D /tmp/scores_headers.txt \
            -o scores.json || echo "[]" > scores.json
          grep -i "x-requests" /tmp/scores_headers.txt || true
      - name: Merge completed matches into permanent archive
        run: |
          jq -e 'type=="array"' results-archive.json > /dev/null 2>&1 || echo "[]" > results-archive.json
          jq -n --slurpfile old results-archive.json --slurpfile new scores.json '
            ($new[0] // [])
            | map(select(.completed == true and .scores != null))
            | map({id, home_team, away_team, scores, commence_time}) as $newMatches
            | (($old[0] // []) + $newMatches)
            | unique_by(.id)
          ' > results-archive.tmp.json
          mv results-archive.tmp.json results-archive.json
      - name: Commit if changed
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add odds.json scores.json results-archive.json
          git diff --staged --quiet || git commit -m "chore: sync World Cup odds & scores"
          git push
