<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Fixture Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070a12;--panel:#0e1622;--line:#1f2c3f;--line2:#2a3a52;--ink:#eaf1fb;--muted:#7e93ad;--green:#16e08a;--amber:#ffc23d;--red:#ff5d6c;}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Manrope',system-ui,sans-serif;background:radial-gradient(900px 500px at 80% -10%,#102a4022,transparent),radial-gradient(700px 500px at 0% 0%,#0c3a2622,transparent),var(--bg);color:var(--ink);line-height:1.45;min-height:100vh;overflow-x:hidden}
  .wrap{max-width:1200px;margin:0 auto;padding:18px 14px 90px}
  header.top{position:relative;border:1px solid var(--line);border-radius:18px;background:linear-gradient(160deg,#0f1a2a,#0a0f18 70%);padding:22px 22px 18px;overflow:hidden}
  header.top::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,#ffffff05 0 2px,transparent 2px 64px);pointer-events:none}
  .brandrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .ball{width:56px;height:56px;flex:none;object-fit:contain;filter:drop-shadow(0 6px 16px #16e08a55)}
  h1{font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(24px,6vw,44px);line-height:.94;letter-spacing:.5px;text-transform:uppercase}
  h1 .yr{color:var(--green)}
  .sub{color:var(--muted);font-size:13px;margin-top:6px;font-weight:600;letter-spacing:.3px}
  .flagsline{font-size:18px;letter-spacing:2px;margin-top:2px}
  .langtoggle{position:absolute;top:16px;right:16px;display:flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;z-index:3}
  .langtoggle button{background:#0c1521;color:var(--muted);border:0;font-family:inherit;font-weight:800;font-size:12px;padding:7px 13px;cursor:pointer;transition:.15s}
  .langtoggle button.active{background:var(--green);color:#06281a}
  .statbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .stat{background:#0c1521;border:1px solid var(--line);border-radius:12px;padding:9px 13px;min-width:104px}
  .stat .n{font-family:'Anton';font-size:22px;line-height:1}
  .stat .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-top:3px}
  .stat.go .n{color:var(--green)}
  .syncrow{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
  .syncbtn{background:#0c3a2722;border:1px solid #2e5a44;color:var(--green);font-family:inherit;font-weight:800;font-size:12px;padding:9px 16px;border-radius:10px;cursor:pointer;letter-spacing:.3px;transition:.15s}
  .syncbtn:hover{background:#0c3a2744;border-color:var(--green)}
  .syncbtn:disabled{opacity:.5;cursor:not-allowed}
  .syncstatus{font-size:11px;font-weight:700;color:var(--muted)}
  .syncstatus.ok{color:var(--green)}.syncstatus.err{color:var(--red)}
  .syncbtn.odds{color:var(--amber);border-color:#5a4a2e;background:#3a2c0c22}
  .syncbtn.odds:hover{background:#3a2c0c44;border-color:var(--amber)}
  .syncbtn.cal:hover{background:#0c3a2744;border-color:var(--green)}
  .oddsrow{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
  .oddschip{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500;padding:3px 7px;border-radius:7px;border:1px solid var(--line2);background:#0a1320;color:var(--muted);letter-spacing:.2px;white-space:nowrap}
  .oddschip b{color:var(--ink);font-weight:500}
  .oddschip.h b{color:var(--green)}.oddschip.d b{color:var(--amber)}.oddschip.a b{color:#7fb2ff}
  .oddssrc{font-size:9px;color:var(--muted);opacity:.7;letter-spacing:.3px;text-transform:uppercase;margin-left:2px}
  .fx.hasresult .oddsrow,.tmatch.hasresult .oddsrow{display:none}
  .tzrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:16px}
  .tzlbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:800}
  select#tzSel{font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);background:#0c1521;border:1px solid var(--line2);border-radius:9px;padding:9px 13px;cursor:pointer;max-width:100%}
  select#tzSel:focus{outline:none;border-color:var(--green)}
  .champ{margin-top:14px;display:none;align-items:center;gap:12px;background:linear-gradient(100deg,#1a1407,#0f0a02);border:1px solid #5a4410;border-radius:14px;padding:12px 16px}
  .champ.show{display:flex}
  .champ .tr{font-size:30px}
  .champ b{font-family:'Anton';font-size:clamp(18px,4vw,26px);letter-spacing:.5px}
  .champ img{height:24px;border-radius:3px;vertical-align:-4px;margin-right:4px}
  .champ span{color:var(--amber);font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:800;display:block}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 16px;position:sticky;top:0;z-index:30;padding:10px 0;background:linear-gradient(var(--bg),var(--bg) 70%,transparent)}
  .tab{flex:1 1 120px;cursor:pointer;border:1px solid var(--line);background:#0c1521;color:var(--muted);font-weight:800;font-size:13px;letter-spacing:.3px;padding:12px 8px;border-radius:12px;text-align:center;transition:.18s;text-transform:uppercase}
  .tab.active{background:var(--green);color:#06281a;border-color:var(--green);box-shadow:0 6px 22px #16e08a33}
  .tab:hover:not(.active){color:var(--ink);border-color:var(--line2)}
  .ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
  .group{border:1px solid var(--line);border-radius:16px;background:var(--panel);overflow:hidden}
  .ghead{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#13202f,#0e1622)}
  .ghead .gl{font-family:'Anton';font-size:20px;letter-spacing:1px}
  .ghead .gl em{color:var(--green);font-style:normal}
  .ghead .gd{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:800;padding:7px 4px;text-align:center;border-bottom:1px solid var(--line)}
  table.tbl th.name{text-align:left;padding-left:14px}
  table.tbl td{padding:7px 4px;text-align:center;border-bottom:1px solid #16212f}
  table.tbl tr:last-child td{border-bottom:0}
  td.name{text-align:left;padding-left:10px}
  .ncell{display:flex;align-items:center;gap:8px;min-width:0}
  .ncell .tn{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ncell img{height:14px;width:21px;object-fit:cover;border-radius:2px;flex:none;background:#22364d}
  td.pts{font-family:'DM Mono';font-weight:500}
  .pos{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:5px;font-size:10px;font-weight:800;color:#06281a;background:var(--green);flex:none}
  .pos.q2{background:#7be0b0}
  .fixtures{padding:8px 12px 14px;border-top:1px solid var(--line);background:#0b121c}
  .md{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;font-weight:800;margin:12px 2px 6px}
  .fx{padding:7px 8px;border-radius:9px;margin-bottom:4px;background:#0d1622;border:1px solid #15212f}
  .fxmeta{font-size:9.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .fxmeta .zt{color:var(--green)}
  .fxmeta .vn{color:#5f7491}
  .fxrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .fxrow .t{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;min-width:0}
  .fxrow .t.home{justify-content:flex-end;text-align:right}
  .fxrow .t img{height:14px;width:21px;object-fit:cover;border-radius:2px;flex:none;background:#22364d}
  .fxrow .t span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sc{display:flex;align-items:center;gap:4px}
  .sc input{width:31px;height:29px;text-align:center;border-radius:7px;border:1px solid var(--line2);background:#0a1018;color:var(--ink);font-family:'DM Mono';font-size:14px;font-weight:500}
  .sc input:focus{outline:none;border-color:var(--green);background:#0c1d16}
  .sc input.filled{border-color:#2e5a44;color:var(--green)}
  .sc .dash{color:var(--muted);font-weight:800}
  .ko-intro{color:var(--muted);font-size:13px;margin-bottom:12px;line-height:1.5}
  .ko-intro b{color:var(--ink)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin:6px 0 16px;font-weight:600}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px}
  .bracket{display:flex;gap:15px;overflow-x:auto;padding:4px 2px 20px;scroll-snap-type:x proximity}
  .round{flex:none;width:202px;scroll-snap-align:start}
  .round h3{font-family:'Anton';font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:2px}
  .round .rd{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:12px;letter-spacing:.4px}
  .matches{display:flex;flex-direction:column;gap:12px;justify-content:space-around;min-height:calc(100% - 52px)}
  .ko{border:1px solid var(--line);border-radius:11px;background:var(--panel);overflow:hidden}
  .ko .mlabel{font-size:9px;color:var(--muted);letter-spacing:.4px;font-weight:700;padding:6px 10px 4px;background:#0b121c;line-height:1.4}
  .ko .mlabel b{color:#8fa3bd}
  .ko .mlabel .zt{color:var(--green)}
  .ko .row{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer;border-top:1px solid #16212f;transition:.14s}
  .ko .row:hover{background:#142133}
  .ko .row.win{background:linear-gradient(90deg,#0c3a2733,transparent)}
  .ko .row.win .nm{color:var(--green)}
  .ko .row.lose{opacity:.42}
  .ko .row.tbd{cursor:default}
  .ko .row.tbd:hover{background:transparent}
  .ko img{height:14px;width:21px;object-fit:cover;border-radius:2px;flex:none;background:#22364d}
  .ko .nm{font-size:12.5px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ko .nm.placeholder{color:var(--muted);font-weight:600;font-style:italic}
  .ko .chk{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--line2);flex:none}
  .ko .row.win .chk{background:var(--green);border-color:var(--green)}
  .ko.final-card{border-color:#5a4410}
  .ko.final-card .mlabel b{color:var(--amber)}
  .ko-final-wrap{display:flex;flex-direction:column;gap:18px;justify-content:center}
  .foot{margin-top:26px;border-top:1px solid var(--line);padding-top:16px;display:flex;flex-direction:column;gap:16px}
  .foot-bottom{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .mlab a{display:inline-flex;align-items:center;gap:9px;text-decoration:none;padding:12px 18px;border:1px solid #1a2030;border-radius:14px;background:#0a0f18;transition:.2s;width:max-content;max-width:100%}
  .mlab a:hover{border-color:#00e5a066;background:#0c1218}
  .mlab .mw{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.03em;line-height:1;display:flex}
  .mlab .mm{color:#e8e8f0}.mlab .mg{color:#00e5a0}
  .mlab .sep{width:1px;height:18px;background:#1f2c3f;flex:none}
  .mlab .ig{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--muted);font-family:'Manrope',sans-serif}
  .mlab a:hover .ig{color:#e8e8f0}
  .note{color:var(--muted);font-size:11.5px;max-width:680px;line-height:1.5}
  .note b{color:var(--ink)}
  button.reset{background:#1a0e10;border:1px solid #45222a;color:var(--red);font-weight:800;font-size:12px;padding:9px 15px;border-radius:10px;cursor:pointer}
  button.reset:hover{background:#24151a}
  .hidden{display:none}
  .teamsel-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .teamsel-wrap label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:800}
  select#teamSel{font-family:inherit;font-weight:700;font-size:14px;color:var(--ink);background:#0c1521;border:1px solid var(--line2);border-radius:10px;padding:10px 14px;cursor:pointer;min-width:200px}
  select#teamSel:focus{outline:none;border-color:var(--green)}
  .teamhead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .tbig{display:flex;align-items:center;gap:12px}
  .tbig img{height:30px;width:45px;object-fit:cover;border-radius:3px;background:#22364d}
  .tbig .tnm{font-family:'Anton';font-size:clamp(20px,5vw,30px);letter-spacing:.5px}
  .tbig .tgr{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.8px}
  .tstat{margin-left:auto;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:6px 12px;border-radius:20px;border:1px solid var(--line2);color:var(--muted)}
  .tstat.q{color:var(--green);border-color:#2e5a44;background:#0c3a2722}
  .tstat.o{color:var(--red);border-color:#45222a;background:#1a0e1022}
  .tphase{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;font-weight:800;margin:16px 2px 8px}
  .tmatch{display:block;padding:12px 14px;border:1px solid var(--line);background:var(--panel);border-radius:12px;margin-bottom:8px}
  .tmatch-main{display:flex;align-items:center;gap:12px}
  .tmatch .when{min-width:150px}
  .tmatch .when .d{font-size:11px;font-weight:800;color:var(--ink);letter-spacing:.3px}
  .tmatch .when .t{font-size:11px;color:var(--green);font-weight:700}
  .tmatch .when .v{font-size:10px;color:#5f7491;font-weight:600;margin-top:1px}
  .tmatch .opp{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
  .tmatch .opp .vs{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase}
  .tmatch .opp img{height:16px;width:24px;object-fit:cover;border-radius:2px;flex:none;background:#22364d}
  .tmatch .opp .on{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tmatch .res{font-family:'DM Mono';font-weight:500;font-size:15px;text-align:right;min-width:62px}
  .tmatch .res .rb{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:5px;font-family:'Manrope';font-weight:800;font-size:11px;margin-left:6px;color:#0a0f18}
  .rb.W{background:var(--green)}.rb.D{background:#8aa0bb}.rb.L{background:var(--red)}
  .res .pend{color:var(--muted);font-size:12px;font-weight:700;font-family:'Manrope'}
  .tempty{color:var(--muted);font-size:13px;padding:20px 4px}
  select#dateSel{font-family:inherit;font-weight:700;font-size:14px;color:var(--ink);background:#0c1521;border:1px solid var(--line2);border-radius:10px;padding:10px 14px;cursor:pointer;min-width:200px}
  select#dateSel:focus{outline:none;border-color:var(--green)}
  .datehead{font-family:'Anton';font-size:18px;letter-spacing:.5px;color:var(--ink);margin:2px 2px 14px;text-transform:uppercase}
  .dmid{color:var(--muted);font-weight:800;font-size:13px}
  .fxrow .t .win{color:var(--green)}
  .fxrow .t .ph{color:var(--muted);font-style:italic;font-weight:600;font-size:11px}

  .calbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 2px 14px}
  .calbtn{appearance:none;border:1px solid #2e5a44;background:#0c3a2722;color:var(--green);font-family:inherit;font-weight:800;font-size:10.5px;letter-spacing:.35px;text-transform:uppercase;padding:7px 10px;border-radius:9px;cursor:pointer;transition:.15s}
  .calbtn:hover{background:#0c3a2744;border-color:var(--green);transform:translateY(-1px)}
  .calbtn.alt{border-color:var(--line2);background:#0c1521;color:var(--ink)}
  .calbtn.alt:hover{border-color:var(--green);color:var(--green)}
  .fx.calpick{cursor:pointer;transition:.15s}
  .fx.calpick:hover{border-color:#2e5a44;background:#0f1b29}
  .fxactions{display:none;gap:7px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid #16212f}
  .fx.showcal .fxactions{display:flex}
  .tmatch.showcal .fxactions{display:flex}
  .yt-btn{display:inline-flex;align-items:center;gap:5px;appearance:none;border:1px solid #3a2020;background:#1a0e0e;color:#ff4444;font-family:inherit;font-weight:800;font-size:10.5px;letter-spacing:.35px;text-transform:uppercase;padding:7px 10px;border-radius:9px;cursor:pointer;text-decoration:none;transition:.15s}
  .yt-btn:hover{background:#2a1515;border-color:#ff4444;color:#ff6666;transform:translateY(-1px)}
  .yt-btn svg{flex:none}
  .fx-hlrow{display:none;margin-top:6px;padding-top:6px;border-top:1px solid #16212f}
  .fx.hasresult .fx-hlrow{display:block}
  .tmatch.hasresult .fx-hlrow{display:block}
  .ko .mlabel{cursor:pointer}
  .koactions{display:none;gap:7px;flex-wrap:wrap;padding:8px 10px;border-top:1px solid #16212f;background:#0b121c}
  .ko.showcal .koactions{display:flex}
  ::-webkit-scrollbar{height:9px;width:9px}::-webkit-scrollbar-thumb{background:#22344a;border-radius:8px}::-webkit-scrollbar-track{background:transparent}
  @media(max-width:560px){.ggrid{grid-template-columns:1fr}.stat{flex:1;min-width:0}.langtoggle{position:static;margin-top:12px;width:max-content}.tmatch-main{align-items:flex-start}.tmatch .when{min-width:120px}.tmatch .res{min-width:42px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="langtoggle">
      <button data-lang="en">EN</button><button data-lang="es">ES</button>

const ALL_MATCHES=[];

Object.keys(KO_META).forEach(id=>ALL_MATCHES.push({iso:KO_META[id][0],v:KO_META[id][1],kind:'k',id}));
function localDate(iso,zone,lang){
  const d=new Date(iso);
  const p=new Intl.DateTimeFormat('en-CA',{timeZone:zone,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);
  const g=tp=>p.find(o=>o.type===tp).value;
  const key=`${g('year')}-${g('month')}-${g('day')}`;
  const lp=new Intl.DateTimeFormat(lang==='es'?'es':'en-US',{timeZone:zone,weekday:'short',day:'numeric',month:'short'}).formatToParts(d);
  const lg=tp=>{const x=lp.find(o=>o.type===tp);return x?x.value:'';};
  return {key,label:`${lg('weekday')} ${lg('day')} ${lg('month')}`.replace(/\./g,'').toUpperCase()};
}
function escHTML(str){return String(str||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function addHours(iso,h){return new Date(new Date(iso).getTime()+h*3600000).toISOString();}
function calStamp(iso){return new Date(iso).toISOString().replace(/[-:]/g,'').replace(/\.\d{3}Z$/,'Z');}
function calText(str){return String(str||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');}
function safeFile(str){return String(str||'calendar').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,80)||'calendar';}
function matchInfo(m,ctx){
  let home,away,phase;
  if(m.kind==='g'){
    home=dispName(m.home);away=dispName(m.away);phase=`${t('group')} ${m.g} · ${t('matchday')} ${m.mdi+1}`;
  }else{
    const mm=KO[m.id],tt=mt(mm,ctx);
    home=tt.a?dispName(tt.a):slotKind(mm.a);away=tt.b?dispName(tt.b):slotKind(mm.b);phase=`${roundName(m.id)} · ${t('match')} ${m.id.slice(1)}`;
  }
  return {title:`World Cup 2026: ${home} ${t('vs')} ${away}`,home,away,phase,venue:dispVenue(m.v),start:m.iso,end:addHours(m.iso,m.kind==='k'?3:2)};
}
function googleCalURL(ev){
  const qs=new URLSearchParams({action:'TEMPLATE',text:ev.title,dates:`${calStamp(ev.start)}/${calStamp(ev.end)}`,details:`${ev.phase}\nTimezone shown in tracker: ${STATE.tz}`,location:ev.venue});
  return 'https://calendar.google.com/calendar/render?'+qs.toString();
}
function addToGoogleCalendar(events,name){
  if(events.length===1){window.open(googleCalURL(events[0]),'_blank','noopener');return;}
  // Google Calendar's direct URL only supports one event. For a full date/team set,
  // create a Google-compatible .ics file so all selected matches import together.
  downloadICS(events,name+' Google Calendar');
  window.open('https://calendar.google.com/calendar/u/0/r/settings','_blank','noopener');
}
function eventICS(ev){return ['BEGIN:VEVENT',`UID:${calStamp(ev.start)}-${safeFile(ev.title)}@matelab.ai`,`DTSTAMP:${calStamp(new Date().toISOString())}`,`DTSTART:${calStamp(ev.start)}`,`DTEND:${calStamp(ev.end)}`,`SUMMARY:${calText(ev.title)}`,`DESCRIPTION:${calText(ev.phase+'\nTimezone shown in tracker: '+STATE.tz)}`,`LOCATION:${calText(ev.venue)}`,'STATUS:CONFIRMED','TRANSP:OPAQUE','SEQUENCE:0','END:VEVENT'].join('\r\n');}
function downloadICS(events,name){
  const isSingle=events.length===1;
  // Single-match .ics files are exported as a plain VEVENT import.
  // No X-WR-CALNAME / calendar feed name is included for single events,
  // so Apple Calendar should not pre-name a new calendar after the match.
  const header=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//matelab.ai//World Cup 2026 Tracker//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  if(!isSingle)header.push(`X-WR-CALNAME:${calText(name)}`);
  const body=[...header,...events.map(eventICS),'END:VCALENDAR'].join('\r\n');
  const blob=new Blob([body],{type:'text/calendar;charset=utf-8;method=PUBLISH'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;
  a.download=isSingle?'add-world-cup-match-event.ics':safeFile(name)+'.ics';
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),30000);
}

  sel.innerHTML=opts.map(o=>`<option value="${o.key}">${o.label}</option>`).join('');
  if(!seen[STATE.dateKey])STATE.dateKey=opts.length?opts[0].key:'';
  sel.value=STATE.dateKey;
}

/* ============ SCORE SYNC (openfootball) ============ */
const SYNC_URL='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
const SYNC_NAMES={"USA":"United States","DR Congo":"Congo DR","Côte d'Ivoire":"Ivory Coast",
  "Turkey":"Türkiye","Bosnia-Herzegovina":"Bosnia & Herzegovina","Bosnia and Herzegovina":"Bosnia & Herzegovina",
  "Cabo Verde":"Cape Verde","Curacao":"Curaçao","Korea Republic":"South Korea",
  "UEFA Path A winner":"Bosnia & Herzegovina","UEFA Path B winner":"Sweden",
  "UEFA Path C winner":"Türkiye","UEFA Path D winner":"Czechia"};
function resolveName(n){return SYNC_NAMES[n]||n;}
function findFxKey(g,t1,t2){
  const names=GROUPS[g].map(tm=>tm[0]);
  const i1=names.indexOf(t1),i2=names.indexOf(t2);
  if(i1<0||i2<0)return null;
  for(let mdi=0;mdi<MD_PAIRS.length;mdi++)for(let pi=0;pi<MD_PAIRS[mdi].length;pi++){
    const p=MD_PAIRS[mdi][pi];
    if(p[0]===i1&&p[1]===i2)return{key:`${g}-${mdi}-${pi}`,flip:false};
    if(p[0]===i2&&p[1]===i1)return{key:`${g}-${mdi}-${pi}`,flip:true};
  }
  return null;
}
async function syncScores(){
  const btn=document.getElementById('syncBtn'),st=document.getElementById('syncStatus');
  btn.disabled=true; st.textContent=t('sync_ing'); st.className='syncstatus';
  try{
    const res=await fetch(SYNC_URL);
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    let count=0;
    (data.matches||[]).forEach(m=>{
      if(!m.score||!m.score.ft||!m.group)return;
      const gL=m.group.replace('Group ','');
      if(!GROUPS[gL])return;
      const n1=resolveName(m.team1),n2=resolveName(m.team2);
      const fx=findFxKey(gL,n1,n2);
      if(!fx)return;
      const sc=m.score.ft;
      const a=fx.flip?sc[1]:sc[0], b=fx.flip?sc[0]:sc[1];
      const old=STATE.gs[fx.key];
      if(!old||+old.a!==a||+old.b!==b){STATE.gs[fx.key]={a,b};count++;}
    });
    if(count>0){save();renderAll();
      st.textContent=t('sync_done').replace('{n}',count);st.className='syncstatus ok';
    }else{st.textContent=t('sync_none');st.className='syncstatus';}
  }catch(e){st.textContent=t('sync_none');st.className='syncstatus';}
  btn.disabled=false;
  setTimeout(()=>{st.textContent='';},5000);
}

/* ============ ODDS SYNC ============ */
/* Source 1 (primary, no key): Polymarket Gamma API — public, free, no auth.
   Probabilities come straight from market prices, so chips read as %.
   NOTE: per-match World Cup moneyline markets are created by Polymarket close
   to kickoff and are NOT exposed under one stable tag, so coverage is partial
   and grows as match-day approaches. We discover them defensively below.
   Source 2 (fallback): The Odds API — clean per-fixture home/draw/away, explicit
   CORS, but needs a free key (stored locally in your browser, never in the repo).
   Get one at https://the-odds-api.com — then click Sync Odds and paste it once. */
/* ascending=false → newest events first; WC 2026 games are at the top that way */
const PM_GAMMA='https://gamma-api.polymarket.com/events?active=true&closed=false&limit=200&order=startDate&ascending=false';
/* fallback: markets endpoint — handles binary yes/no sports markets */
const PM_GAMMA_MKT='https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=500&order=volume&ascending=false';
const ODDS_API_SPORT='soccer_fifa_world_cup';
/* maps provider spellings -> tracker names (extends SYNC_NAMES) */
const ODDS_NAMES=Object.assign({},SYNC_NAMES,{
  "Korea Republic":"South Korea","Republic of Korea":"South Korea","IR Iran":"Iran","Cote d'Ivoire":"Ivory Coast",
  "Côte d’Ivoire":"Ivory Coast","Czech Republic":"Czechia","Bosnia and Herzegovina":"Bosnia & Herzegovina",
  "United States of America":"United States","USMNT":"United States"});
function oddsName(n){n=(n||'').trim();return ODDS_NAMES[n]||n;}
/* find a group fixture key from two team names, in any group (order-independent) */
function findFxByTeams(a,b){
  a=oddsName(a);b=oddsName(b);
  for(const g of GLETTERS){const names=GROUPS[g].map(tm=>tm[0]);
    if(names.includes(a)&&names.includes(b))return findFxKey(g,a,b);}
  return null;
}
/* normalise three implied numbers to whole percentages summing ~100 */
function toPct(h,d,a){const s=h+d+a;if(s<=0)return null;
  let H=Math.round(h/s*100),D=Math.round(d/s*100),A=Math.round(a/s*100);
  const diff=100-(H+D+A);A+=diff; // dump rounding remainder on away
  return {h:H,d:D,a:A};}
function storeOdds(key,flip,h,d,a,src){
  const p=flip?toPct(a,d,h):toPct(h,d,a);if(!p)return false;
  p.src=src;STATE.odds[key]=p;return true;}
/* --- helpers for parsing both event-based and market-based Polymarket data --- */
function _pmMatchOutcomes(mk,A,B){
  /* Handles two formats:
     (a) Multi-outcome: outcomes=["Mexico","Draw","South Africa"], outcomePrices=["0.69","0.21","0.11"]
     (b) Binary yes/no: outcomes=["Yes","No"], question="Will Mexico win vs South Africa?" */
  let pH=0,pD=0,pA=0;
  mk.forEach(mt=>{
    let outs,prices;try{outs=JSON.parse(mt.outcomes||'[]');prices=JSON.parse(mt.outcomePrices||'[]');}catch(e){return;}
    const q=(mt.question||mt.groupItemTitle||'').toLowerCase();
    outs.forEach((o,i)=>{
      const lbl=(o||'').toLowerCase(),pr=parseFloat(prices[i]||'0');
      if(/draw|tie/.test(lbl)){pD=Math.max(pD,pr);}
      else if(oddsName(o)===A||/\b(home)\b/.test(lbl)){pH=Math.max(pH,pr);}
      else if(oddsName(o)===B||/\b(away)\b/.test(lbl)){pA=Math.max(pA,pr);}
      else if(lbl==='yes'){
        /* binary market — infer which team/outcome from question text */
        if(/draw|tie/.test(q))pD=Math.max(pD,pr);
        else if(A&&q.indexOf(A.toLowerCase())>-1)pH=Math.max(pH,pr);
        else if(B&&q.indexOf(B.toLowerCase())>-1)pA=Math.max(pA,pr);
      }
    });
  });
  return {pH,pD,pA};
}
async function _pmFromEvents(url){
  let n=0;
  try{
    const res=await fetch(url);if(!res.ok)return 0;
    const events=await res.json();
    (Array.isArray(events)?events:[]).forEach(ev=>{
      if(!ev.slug||!ev.slug.startsWith('fifwc-'))return;
      const title=(ev.title||'')+'';
      const m=title.match(/^(.+?)\s+vs\.?\s+(.+?)(?:\s*[:\-–].*)?$/i);if(!m)return;
      const t1=m[1],t2=m[2];const fx=findFxByTeams(t1,t2);if(!fx)return;
      const mk=(ev.markets||[]);if(!mk.length)return;
      const A=oddsName(t1),B=oddsName(t2);
      const {pH,pD,pA}=_pmMatchOutcomes(mk,A,B);
      if(pH+pD+pA>0&&storeOdds(fx.key,fx.flip,pH,pD,pA,'PM'))n++;
    });
  }catch(e){}
  return n;
}
async function _pmFromMarkets(url){
  /* Groups binary markets by their fifwc-xxx-yyy-date prefix, extracts H/D/A */
  let n=0;
  try{
    const res=await fetch(url);if(!res.ok)return 0;
    const mkts=await res.json();
    const groups={};
    (Array.isArray(mkts)?mkts:[]).forEach(mt=>{
      if(!mt.slug)return;
      const mp=mt.slug.match(/^(fifwc-[a-z]+-[a-z]+-\d{4}-\d{2}-\d{2})/);if(!mp)return;
      const pfx=mp[1];
      (groups[pfx]=groups[pfx]||[]).push(mt);
    });
    Object.values(groups).forEach(mts=>{
      /* Try to identify teams from a question like "Will Mexico win vs South Africa?" */
      let fx=null,A=null,B=null;
      for(const mt of mts){
        const qm=(mt.question||'').match(/will (.+?) win(?:\s+vs\.?\s+(.+?))?[?.]?$/i);
        if(qm&&qm[2]){const h=qm[1].trim(),a=qm[2].trim();
          const f=findFxByTeams(h,a);if(f){fx=f;A=oddsName(h);B=oddsName(a);break;}}
      }
      if(!fx)return;
      const {pH,pD,pA}=_pmMatchOutcomes(mts,A,B);
      if(pH+pD+pA>0&&storeOdds(fx.key,fx.flip,pH,pD,pA,'PM'))n++;
    });
  }catch(e){}
  return n;
}
async function syncOddsPolymarket(){
  /* Try 1: events endpoint, newest first (WC 2026 games appear at the top) */
  let n=await _pmFromEvents(PM_GAMMA);
  /* Try 2: markets endpoint — handles new binary yes/no sports market format */
  if(n===0)n=await _pmFromMarkets(PM_GAMMA_MKT);
  return n;
}
async function syncOddsTheOddsAPI(key){
  const url=`https://api.the-odds-api.com/v4/sports/${ODDS_API_SPORT}/odds/?regions=uk,eu&markets=h2h&oddsFormat=decimal&apiKey=${encodeURIComponent(key)}`;
  const res=await fetch(url);if(!res.ok)throw new Error('oddsapi '+res.status);
  const games=await res.json();let n=0;
  (Array.isArray(games)?games:[]).forEach(gm=>{
    const fx=findFxByTeams(gm.home_team,gm.away_team);if(!fx)return;
    const bk=(gm.bookmakers||[])[0];if(!bk)return;
    const mkt=(bk.markets||[]).find(x=>x.key==='h2h');if(!mkt)return;
    let dH=0,dD=0,dA=0;const H=oddsName(gm.home_team),A=oddsName(gm.away_team);
    (mkt.outcomes||[]).forEach(o=>{const dec=parseFloat(o.price||'0');if(dec<=0)return;const imp=1/dec;
      if(/draw/i.test(o.name))dD=imp;else if(oddsName(o.name)===H)dH=imp;else if(oddsName(o.name)===A)dA=imp;});
    if(dH+dD+dA>0&&storeOdds(fx.key,fx.flip,dH,dD,dA,'ODDS'))n++;
  });
  return n;
}
async function syncOdds(){
  const btn=document.getElementById('oddsBtn'),st=document.getElementById('syncStatus');
  btn.disabled=true;st.textContent=t('odds_ing');st.className='syncstatus';
  let n=0,failed=false;
  n=await syncOddsPolymarket();
  if(n===0){ // Polymarket gave nothing usable — try The Odds API
    let key=STATE.oddsKey;
    if(!key){key=(prompt('Polymarket odds unavailable right now.\n\nOptional: paste a free The Odds API key (the-odds-api.com) to pull bookmaker odds instead. Leave blank to skip.')||'').trim();
      if(key){STATE.oddsKey=key;}}
    if(key){try{n=await syncOddsTheOddsAPI(key);failed=false;}catch(e){failed=true;}}
  }
  if(n>0){save();renderAll();st.textContent=t('odds_done').replace('{n}',n);st.className='syncstatus ok';}
  else{st.textContent=t('odds_none');st.className='syncstatus';}
  btn.disabled=false;setTimeout(()=>{st.textContent='';},6000);
}
function oddsChipHTML(key){
  const o=STATE.odds&&STATE.odds[key];if(!o)return '';
  const src=o.src==='ODDS'?'odds api':'polymarket';
  return `<div class="oddsrow"><span class="oddschip h">1 <b>${o.h}%</b></span>`+
    `<span class="oddschip d">X <b>${o.d}%</b></span>`+
    `<span class="oddschip a">2 <b>${o.a}%</b></span>`+
    `<span class="oddssrc">${src}</span></div>`;
}

/* ============ FULL CALENDAR DOWNLOAD ============ */
function downloadFullCalendar(){
  const st=document.getElementById('syncStatus');
  const ctx=buildCtx();
  const events=ALL_MATCHES.slice().sort((a,b)=>new Date(a.iso)-new Date(b.iso)).map(m=>matchInfo(m,ctx));
  downloadICS(events,'World Cup 2026 Full Schedule');
  st.textContent=t('cal_full_done');st.className='syncstatus ok';
  setTimeout(()=>{st.textContent='';},5000);
}

/* ============ STATS ============ */
function renderStats(){
  let played=0;Object.values(STATE.gs).forEach(s=>{if(s&&s.a!==''&&s.a!=null&&s.b!==''&&s.b!=null)played++;});
  document.getElementById('st-played').textContent=played+'/72';
  const tb=allTables();document.getElementById('st-groups').textContent=GLETTERS.filter(g=>tb[g].complete).length+'/12';
  let ko=0;Object.keys(STATE.ko).forEach(id=>{if(STATE.ko[id])ko++;});
  document.getElementById('st-ko').textContent=ko+'/32';
  const champ=STATE.ko['m104'],cE=document.getElementById('champ');
  if(champ){cE.classList.add('show');document.getElementById('champ-name').innerHTML=`<img src="${flagOf(champ)}">${dispName(champ)}`;}else cE.classList.remove('show');
}
function renderAll(){applyChrome();renderGroups();renderKO();renderTeam();renderDate();renderStats();}

/* ============ EVENTS ============ */
document.addEventListener('input',e=>{
  const inp=e.target.closest('input[data-k]');if(!inp)return;
  let v=inp.value;if(v!=='')v=Math.max(0,parseInt(v)||0);
  STATE.gs[inp.dataset.k]=STATE.gs[inp.dataset.k]||{a:'',b:''};STATE.gs[inp.dataset.k][inp.dataset.s]=v;inp.classList.toggle('filled',v!=='');
  const k=inp.dataset.k,s=inp.dataset.s,caret=inp.selectionStart;
  renderGroups();const el=document.querySelector(`input[data-k="${k}"][data-s="${s}"]`);if(el){el.focus();try{el.setSelectionRange(caret,caret);}catch(_){}}
  renderKO();renderTeam();renderDate();renderStats();save();
});
document.addEventListener('click',e=>{
  const cal=e.target.closest('[data-cal]');
  if(cal){
    e.stopPropagation();
    const ctx=buildCtx(),type=cal.dataset.type,id=cal.dataset.id;
    let matches=[],name='world-cup-2026';
    if(type==='match'){const m=ALL_MATCHES.find(x=>(x.kind==='g'?x.key:x.id)===id);if(m){matches=[m];name=matchInfo(m,ctx).title;}}
    if(type==='date'){matches=ALL_MATCHES.filter(m=>localDate(m.iso,STATE.tz).key===id).sort((a,b)=>new Date(a.iso)-new Date(b.iso));name=`World Cup 2026 ${id}`;}
    if(type==='team'){matches=teamMatchesForCalendar(id,ctx);name=`World Cup 2026 ${id}`;}
    const events=matches.map(m=>matchInfo(m,ctx));
    if(!events.length)return;
    if(cal.dataset.cal==='google') addToGoogleCalendar(events,name);
    else downloadICS(events,name);
    return;
  }
  const fx=e.target.closest('.fx.calpick[data-match-id]');
  if(fx&&!e.target.closest('input')){fx.classList.toggle('showcal');return;}
  const tm=e.target.closest('.tmatch.calpick[data-match-id]');
  if(tm){tm.classList.toggle('showcal');return;}
  const kl=e.target.closest('.ko.calpick .mlabel');
  if(kl){kl.closest('.ko.calpick').classList.toggle('showcal');return;}
  const row=e.target.closest('.ko .row[data-pick]');if(!row)return;
  const m=row.dataset.m,pick=row.dataset.pick;
  if(STATE.ko[m]===pick)delete STATE.ko[m];else STATE.ko[m]=pick;
  renderKO();renderTeam();renderStats();save();
});
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  const v=t.dataset.view;
  document.getElementById('view-groups').classList.toggle('hidden',v!=='groups');
  document.getElementById('view-ko').classList.toggle('hidden',v!=='ko');
  document.getElementById('view-team').classList.toggle('hidden',v!=='team');
  document.getElementById('view-date').classList.toggle('hidden',v!=='date');
}));
document.getElementById('teamSel').addEventListener('change',e=>{STATE.team=e.target.value;renderTeam();save();});
document.getElementById('dateSel').addEventListener('change',e=>{STATE.dateKey=e.target.value;renderDate();save();});
document.getElementById('syncBtn').addEventListener('click',syncScores);
document.getElementById('oddsBtn').addEventListener('click',syncOdds);
document.getElementById('calFullBtn').addEventListener('click',downloadFullCalendar);
document.getElementById('tzSel').addEventListener('change',e=>{STATE.tz=e.target.value;populateDateSelect();renderGroups();renderKO();renderTeam();renderDate();save();});
document.querySelectorAll('.langtoggle button').forEach(b=>b.addEventListener('click',()=>{STATE.lang=b.dataset.lang;populateTzSelect();populateTeamSelect();populateDateSelect();renderAll();save();}));
document.getElementById('reset').addEventListener('click',async()=>{if(!confirm(t('confirm_reset')))return;STATE={gs:{},ko:{},odds:{},oddsKey:STATE.oddsKey,tz:STATE.tz,team:"Colombia",lang:STATE.lang};await save();renderAll();});

/* ============ INIT ============ */
(async()=>{await load();populateTzSelect();populateTeamSelect();populateDateSelect();const ctx=buildCtx();if(pruneKO(ctx))save();renderAll();})();
